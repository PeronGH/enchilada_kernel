name: Build Kernel
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential cpio device-tree-compiler \
            flex kmod libelf-dev libssl-dev libtfm-dev openssl python3

      - name: Fix duplicate DTS label
        run: |
          sed -i 's/qnovo_fet_ctrl_default: qnovo_fet_ctrl_default {/qnovo_fet_ctrl_default {/' kernel/arch/arm64/boot/dts/qcom/fajita.dtsi

      - name: Build
        run: |
          cd kernel
          export PATH="$GITHUB_WORKSPACE/clang/bin:$GITHUB_WORKSPACE/gcc64/bin:$GITHUB_WORKSPACE/gcc32/bin:$PATH"
          make -j$(nproc) O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            vendor/enchilada_defconfig
          make -j$(nproc) O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi-

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz-dtb
          path: kernel/out/arch/arm64/boot/Image.gz-dtb

      - name: Package with AnyKernel3
        run: |
          sed -i AnyKernel3/anykernel.sh \
            -e 's/device.name1=.*/device.name1=enchilada/' \
            -e 's/device.name2=.*/device.name2=/' \
            -e 's/device.name3=.*/device.name3=/' \
            -e 's/device.name4=.*/device.name4=/' \
            -e 's/device.name5=.*/device.name5=/' \
            -e 's|kernel.string=.*|kernel.string=Custom Kernel for OnePlus 6|'
          cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cd AnyKernel3
          zip -r9 ../AnyKernel3-enchilada.zip * -x .git .github README.md

      - name: Upload flashable zip
        uses: actions/upload-artifact@v4
        with:
          name: AnyKernel3-enchilada
          path: AnyKernel3-enchilada.zip
