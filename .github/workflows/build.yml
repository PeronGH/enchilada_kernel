name: Build Kernel
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Build
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/EdwinMoq/android_kernel_oneplus_sdm845
          kernel-branch: lineage-23.2-4.19
          config: vendor/enchilada_defconfig
          arch: arm64
          other-clang-url: https://github.com/ZyCromerZ/Clang/releases/download/15.0.7-20260208-release/Clang-15.0.7-20260208.tar.gz
          aosp-gcc: true
          lxc: true
          anykernel3: true
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
