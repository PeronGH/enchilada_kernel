name: Build Kernel
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Build
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/EdwinMoq/android_kernel_oneplus_sdm845
          kernel-branch: lineage-23.2-4.19
          config: vendor/enchilada_defconfig
          arch: arm64
          aosp-gcc: true
          other-clang-url: https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master-kernel-build-2021/clang-r416183b.tar.gz
          lxc: true
          anykernel3: true
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
