name: Build Kernel
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 1

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential cpio device-tree-compiler \
            flex kmod libelf-dev libssl-dev libtfm-dev openssl python3

      - name: Configure kernel
        run: |
          cd kernel
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          export ARCH=arm64
          export MAKE_OPTS="LLVM=1 LLVM_IAS=0"
          make -j$(nproc) O=out $MAKE_OPTS vendor/enchilada_defconfig
          scripts/kconfig/merge_config.sh -m -O out out/.config \
            "$GITHUB_WORKSPACE"/configs/*.config
          make -j$(nproc) O=out $MAKE_OPTS olddefconfig

      - name: Build
        run: |
          cd kernel
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          export ARCH=arm64
          make -j$(nproc) O=out LLVM=1 LLVM_IAS=0 \
            KCFLAGS="-mcpu=cortex-a75"

      - name: Upload kernel image
        uses: actions/upload-artifact@v7
        with:
          name: kernel
          path: kernel/out/arch/arm64/boot/Image.gz-dtb

      - name: Setup Magisk
        run: |
          gh release download v30.7 --repo topjohnwu/Magisk --pattern 'Magisk-*.apk' --dir /tmp/magisk
          unzip -o /tmp/magisk/Magisk-*.apk -d /tmp/magisk
          chmod 755 /tmp/magisk/lib/x86_64/libmagiskboot.so
          gh release download stock-boot --pattern boot.img --dir /tmp
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Repack boot.img
        run: |
          scripts/repack-boot.sh /tmp/magisk kernel/out/arch/arm64/boot/Image.gz-dtb \
            /tmp/boot.img boot.img

      - name: Upload boot.img
        uses: actions/upload-artifact@v7
        with:
          name: boot
          path: boot.img

      - name: Repack boot.img (Magisk)
        run: |
          scripts/repack-boot.sh /tmp/magisk kernel/out/arch/arm64/boot/Image.gz-dtb \
            /tmp/boot.img boot-magisk.img --magisk

      - name: Upload boot.img (Magisk)
        uses: actions/upload-artifact@v7
        with:
          name: boot-magisk
          path: boot-magisk.img
