name: Build Kernel
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 1

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential cpio device-tree-compiler \
            flex kmod libelf-dev libssl-dev libtfm-dev openssl python3

      - name: Configure kernel
        run: |
          cd kernel
          export PATH="$GITHUB_WORKSPACE/clang/bin:$GITHUB_WORKSPACE/gcc64/bin:$GITHUB_WORKSPACE/gcc32/bin:$PATH"
          export ARCH=arm64
          export MAKE_OPTS="CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_ARM32=arm-linux-androideabi-"
          make -j$(nproc) O=out $MAKE_OPTS vendor/enchilada_defconfig
          scripts/kconfig/merge_config.sh -m -O out out/.config \
            "$GITHUB_WORKSPACE"/configs/*.config
          make -j$(nproc) O=out $MAKE_OPTS olddefconfig

      - name: Build
        run: |
          cd kernel
          export PATH="$GITHUB_WORKSPACE/clang/bin:$GITHUB_WORKSPACE/gcc64/bin:$GITHUB_WORKSPACE/gcc32/bin:$PATH"
          export ARCH=arm64
          make -j$(nproc) O=out \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi-

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz-dtb
          path: kernel/out/arch/arm64/boot/Image.gz-dtb

      - name: Package with AnyKernel3
        run: |
          cp anykernel.sh AnyKernel3/anykernel.sh
          sed -i '1s|#!/sbin/sh|#!/bin/sh|' AnyKernel3/META-INF/com/google/android/update-binary
          cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cd AnyKernel3
          zip -r9 ../AnyKernel3-enchilada.zip * -x .git .github README.md

      - name: Upload flashable zip
        uses: actions/upload-artifact@v4
        with:
          name: AnyKernel3-enchilada
          path: AnyKernel3-enchilada.zip
