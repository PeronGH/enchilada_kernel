name: Build Kernel
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential cpio device-tree-compiler \
            flex kmod libelf-dev libssl-dev libtfm-dev openssl python3

      - name: Clone kernel
        run: git clone --depth=1 -b lineage-23.2-4.19 https://github.com/EdwinMoq/android_kernel_oneplus_sdm845 kernel

      - name: Build
        run: |
          cd kernel
          make -j$(nproc) O=out ARCH=arm64 vendor/enchilada_defconfig
          make -j$(nproc) O=out ARCH=arm64

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
