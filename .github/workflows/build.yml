name: Build Kernel
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 1

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential cpio device-tree-compiler \
            flex kmod libelf-dev libssl-dev libtfm-dev openssl python3

      - name: Configure kernel
        run: |
          cd kernel
          export PATH="$GITHUB_WORKSPACE/clang/bin:$GITHUB_WORKSPACE/gcc64/bin:$GITHUB_WORKSPACE/gcc32/bin:$PATH"
          export ARCH=arm64
          export MAKE_OPTS="CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_ARM32=arm-linux-androideabi-"
          make -j$(nproc) O=out $MAKE_OPTS vendor/enchilada_defconfig
          scripts/kconfig/merge_config.sh -m -O out out/.config \
            "$GITHUB_WORKSPACE"/configs/*.config
          make -j$(nproc) O=out $MAKE_OPTS olddefconfig

      - name: Build
        run: |
          cd kernel
          export PATH="$GITHUB_WORKSPACE/clang/bin:$GITHUB_WORKSPACE/gcc64/bin:$GITHUB_WORKSPACE/gcc32/bin:$PATH"
          export ARCH=arm64
          make -j$(nproc) O=out \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi-

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz-dtb
          path: kernel/out/arch/arm64/boot/Image.gz-dtb

      - name: Setup Magisk tools
        run: |
          gh release download v30.7 --repo topjohnwu/Magisk --pattern 'Magisk-*.apk' --dir /tmp/magisk
          unzip -o /tmp/magisk/Magisk-*.apk -d /tmp/magisk \
            lib/x86_64/libmagiskboot.so \
            lib/arm64-v8a/libmagiskinit.so \
            lib/arm64-v8a/libmagisk.so \
            lib/arm64-v8a/libinit-ld.so \
            assets/stub.apk
          install -m755 /tmp/magisk/lib/x86_64/libmagiskboot.so /usr/local/bin/magiskboot
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Repack boot.img
        run: |
          mkdir boot && cd boot
          gh release download stock-boot --pattern boot.img
          magiskboot unpack boot.img
          cp ../kernel/out/arch/arm64/boot/Image.gz-dtb kernel
          magiskboot repack boot.img new-boot.img
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Repack boot.img (Magisk)
        run: |
          mkdir boot-magisk && cd boot-magisk
          gh release download stock-boot --pattern boot.img
          magiskboot unpack boot.img
          cp ../kernel/out/arch/arm64/boot/Image.gz-dtb kernel
          cp ramdisk.cpio ramdisk.cpio.orig
          cp /tmp/magisk/lib/arm64-v8a/libmagiskinit.so magiskinit
          cp /tmp/magisk/lib/arm64-v8a/libmagisk.so magisk
          cp /tmp/magisk/lib/arm64-v8a/libinit-ld.so init-ld
          cp /tmp/magisk/assets/stub.apk stub.apk
          magiskboot compress=xz magisk magisk.xz
          magiskboot compress=xz stub.apk stub.xz
          magiskboot compress=xz init-ld init-ld.xz
          echo "KEEPVERITY=false" > config
          echo "KEEPFORCEENCRYPT=false" >> config
          echo "RECOVERYMODE=false" >> config
          echo "VENDORBOOT=false" >> config
          echo "SHA1=$(magiskboot sha1 boot.img)" >> config
          magiskboot cpio ramdisk.cpio \
            "add 0750 init magiskinit" \
            "mkdir 0750 overlay.d" \
            "mkdir 0750 overlay.d/sbin" \
            "add 0644 overlay.d/sbin/magisk.xz magisk.xz" \
            "add 0644 overlay.d/sbin/stub.xz stub.xz" \
            "add 0644 overlay.d/sbin/init-ld.xz init-ld.xz" \
            "patch" \
            "backup ramdisk.cpio.orig" \
            "mkdir 000 .backup" \
            "add 000 .backup/.magisk config"
          magiskboot repack boot.img new-boot.img
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload boot.img
        uses: actions/upload-artifact@v4
        with:
          name: boot.img
          path: boot/new-boot.img

      - name: Upload boot.img (Magisk)
        uses: actions/upload-artifact@v4
        with:
          name: boot-magisk.img
          path: boot-magisk/new-boot.img
